# Ariadne — push마다 사이클 체인 웹 뷰어를 GitHub Pages로 배포한다.
# 빌드는 배포된 도구(rooms/deployment/ariadne-spec/ari.py)만 사용하며 어떤 설치도 하지 않는다.
# 이 파일의 run 블록은 loom/C007의 검증이 그대로 추출해 실행한다 — 워크플로가 낡으면 테스트가 깨진다.
name: ariadne-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build chain viewer
        run: |
          mkdir -p _site
          python3 rooms/deployment/ariadne-spec/ari.py web -o _site/index.html --title "Ariadne — 사이클 체인"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

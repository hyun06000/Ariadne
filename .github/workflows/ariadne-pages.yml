# Ariadne — push마다 사이클 체인 웹 뷰어를 GitHub Pages로 배포한다.
# 빌드는 배포된 도구(rooms/deployment/ariadne-spec/gil.py)만 사용하며 어떤 설치도 하지 않는다.
# 이 파일의 run 블록은 loom/C007의 검증이 그대로 추출해 실행한다 — 워크플로가 낡으면 테스트가 깨진다.
name: ariadne-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # [loom/C089] 태그까지 가져온다 — 없으면 뷰어가 배포 계보를 태그와 대조 못 해
                           # 전 릴리스를 "⚠ CHANGELOG만" drift로 오표시한다(checkout 기본은 태그 미포함).
      - name: Build chain viewer
        run: |
          mkdir -p _site/branches
          python3 rooms/deployment/ariadne-spec/gil.py web -o _site/index.html --title "Ariadne — 사이클 체인"
          # [v3-build/C029] v3 통합 뷰어 — migrate로 원장에 v3 눈(notes)을 각인한 뒤 web --v3.
          #   원격 notes에 안 기댄다: 원장(커밋)만으로 항상 최신 v3 눈을 재각인한다 (C026 형태).
          #   migrate는 refs/notes만 바꾼다 (커밋 불변, C018).
          git config user.email "gil-pages@ariadne.local"
          git config user.name "gil-pages"
          python3 rooms/deployment/ariadne-spec/gil.py migrate .
          python3 rooms/deployment/ariadne-spec/gil.py web --v3 -o _site/v3.html
          # index.html 최상단에 v3 뷰어 링크 배너 삽입 (사용자가 v3에 닿게). sed 이식성 회피 — 파일 조립.
          V3BANNER='<div style="padding:8px 14px;background:#1a1a2e;color:#fff;font:14px system-ui;text-align:center"><a href="v3.html" style="color:#8be9fd">→ v3 통합 계보 뷰어 (사이클 간 DAG × 사이클 내 스텝 트리 드릴다운)</a></div>'
          printf '%s\n' "$V3BANNER" > _site/index.tmp && cat _site/index.html >> _site/index.tmp && mv _site/index.tmp _site/index.html
          git fetch --quiet origin '+refs/heads/worktree-*:refs/remotes/origin/worktree-*' || true
          : > /tmp/brlist.html
          for BR in $(git for-each-ref --format='%(refname:short)' 'refs/remotes/origin/worktree-*'); do
            NAME=$(basename "$BR")
            rm -rf /tmp/br && mkdir -p /tmp/br
            git archive "$BR" rooms/experiment | tar -x -C /tmp/br || continue
            python3 rooms/deployment/ariadne-spec/gil.py web /tmp/br/rooms/experiment/chains -o "_site/branches/$NAME.html" --title "Ariadne — $NAME (존재의 브랜치)" || continue
            echo "<li><a href=\"$NAME.html\">$NAME</a></li>" >> /tmp/brlist.html
          done
          LIST=$(cat /tmp/brlist.html); [ -n "$LIST" ] || LIST='<li>(진행 중인 존재 브랜치 없음)</li>'
          printf '<title>존재의 브랜치</title><h1>존재들의 작업 브랜치</h1><p><a href="../index.html">← main 뷰어</a></p><ul>%s</ul>\n' "$LIST" > _site/branches/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

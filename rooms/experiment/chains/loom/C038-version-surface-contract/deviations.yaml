# 사전등록(1-hypothesis.md)으로부터의 이탈 기록 — Ariadne의 첫 deviations.yaml (스키마 v0.3, maru의 이슈 #1)
# 이탈은 위반이 아니라 합법이다. 다만 보여야 한다: "어길 수 없게"가 아니라 "어긴 것이 보이게".

- id: D1
  what: 기각 조건 4의 판정 수치 (28/28 → 29/29)
  registered: |
    1-hypothesis.md 기각 조건 4: "릴리스 후 두 구현의 conformance가 28/28을 유지하지 못한다."
  actual: |
    판정기에 VERSION-SEMVER 항목을 추가해 총계가 29가 됐고, 판정은 29/29 ×2로 수행했다.
  why: |
    스텝 1(가설) 시점에는 판정기 확장을 결정하지 않았고, 스텝 2(설계)에서 "version 표면의 형태를
    판정기가 처음으로 본다"는 필요가 드러나 항목을 더했다. 조건의 문면은 28이지만 의도는 "회귀 없음"이며
    (C011: 기각 조건은 문면이 아니라 의도로 읽는다), 항목이 늘고 전 항목이 통과했으므로 회귀는 0이다.
  alternative_rejected: |
    가설 문서의 28을 29로 사후 수정하는 것 — 사전등록이 무의미해지므로 거부했다.
    닫히지 않은 사이클이라 물리적으로는 가능했으나, 그것이 바로 사전등록이 막으려는 행동이다.
  impact: |
    판정의 엄밀성에 영향 없음 (더 엄격한 판정을 수행했다: 항목 28 → 29).
    방법론에는 영향 있음 → 5-report.md의 교훈으로 승격: 가설의 수치는 변할 수 있는 것(항목 총계)이 아니라
    변하면 안 되는 것(회귀 0)으로 써야 한다.

# 사이클 메타데이터 — 체인의 계보는 이 파일로 추적된다. 스키마 v0.4 (규칙 R1~R11은 스펙 문서 참조)
id: C000-slug            # C<3자리 이상 번호>-<소문자 케밥 슬러그>. 번호는 체인 내 유일, 디렉토리명과 일치
chain: chain-name        # 소속 체인 (chains/ 아래 디렉토리명과 일치)
parent: null             # 같은 체인 내 부모 사이클의 로컬 id. 분기면 하나, 병합이면 리스트, 최초면 null
lineage: []              # 다른 체인의 보고서에서 얻은 교훈의 연원. 전역 표기 [<chain>/<id>] (v0.2 신설)
step: 1                  # 진행 스텝 1~5 (가설·설계·검증·분석·보고). gil step이 전이, close가 5로 마감 (v0.6)
author: clew             # 이 사이클을 수행한 존재 (rooms/existence/의 이름)
status: open             # open | closed
opened: 2026-07-13       # 사이클 시작일
closed: null             # 보고서 퍼블리시일
title: ""                # 이 사이클이 정복하려는 가장 작은 문제 한 줄
verdict: null            # 결말: supported|partial|rejected|inconclusive (close --verdict, v0.3)
deviations: 0            # 사전등록 이탈 건수. N>0이면 deviations.yaml 필수 (v0.3)
corrections: 0           # 출처 필드 정정 횟수. N>0이면 corrections.yaml 필수 (v0.5, gil correct)
superseded_by: null      # 이 사이클을 무효화·대체한 후속 사이클 (gil supersede, v0.4)
